<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mój Darmowy Word</title>
    <!-- Ładujemy edytor Quill z sieci CDN -->
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2b579a; /* Kolor klasycznego Worda */
            margin-top: 0;
        }
        #editor {
            height: 400px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Mój Darmowy Word 📝</h1>
    <!-- Miejsce na edytor -->
    <div id="editor">
        <p>Wpisz tutaj swój tekst...</p>
    </div>
</div>

<!-- Skrypt uruchamiający edytor -->
<script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
<script>
  const quill = new Quill('#editor', {
    theme: 'snow',
    modules: {
      toolbar: [
        [{ 'header': [1, 2, 3, false] }],
        ['bold', 'italic', 'underline', 'strike'],        
        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
        ['clean']                                         
      ]
    }
  });
</script>

</body>
</html>
